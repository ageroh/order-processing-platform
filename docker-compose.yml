services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: order_processing
      POSTGRES_USER: order_processing
      POSTGRES_PASSWORD: order_processing
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_processing -d order_processing"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/OrderProcessing.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Orders: Host=postgres;Port=5432;Database=order_processing;Username=order_processing;Password=order_processing
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: src/OrderProcessing.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__Orders: Host=postgres;Port=5432;Database=order_processing;Username=order_processing;Password=order_processing
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
